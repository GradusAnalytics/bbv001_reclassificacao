name: Build and Deploy to ECR

on:
  push:
    branches:
      - main
      - dev  # or the branch you want to trigger this action

env:
  AWS_REGION: "us-east-1"  # Change this to your desired region
  AWS_S3_BUCKET: "bucket-gradus-packages"
  PYTHON_VERSION: "3.11"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Get directory name
        id: get-dir-name
        run: |
          dirname=$(basename "$GITHUB_WORKSPACE")
          echo "Directory name is: $dirname"
          echo "::set-output name=dirname::$dirname"

      - name: Extract repository name
        id: extract-repo-name
        run: |
          repo_name=$(basename ${{steps.get-dir-name.outputs.dirname}})
          repo_name="${repo_name}"_ecs
          echo "::set-output name=repo_name::$repo_name"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
  
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
  
      - name: Build and push Docker images
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{steps.extract-repo-name.outputs.repo_name}}
        run: |
          # Tag images differently for dev and prd
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            IMAGE_TAG="prd"
          else
            IMAGE_TAG="dev"
          fi
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY || aws ecr create-repository --repository-name $ECR_REPOSITORY
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Check if ECS task exists
        id: check-ecs-task
        run: |
          # Use AWS CLI to describe ECS task
          aws ecs describe-task-definition --task-definition $ECR_REPOSITORY > /dev/null 2>&1 || echo "::set-output name=task_exists::false"
          echo "::set-output name=task_exists::true"
    
      - name: Update or create ECS task
        env:
          CLUSTER: cluster_2
        run: |
          if [[ "${{ steps.check-ecs-task.outputs.task_exists }}" == 'true' ]]; then
            # Task exists, update service
            new_task_definition=$(aws ecs register-task-definition --cli-input-json file://task-definition.json)
            # aws ecs update-service --cluster ${CLUSTER} --task-definition $new_task_definition --service xyz
          else
            # Task doesn't exist, create new task and service
            new_task_definition=$(aws ecs register-task-definition --cli-input-json file://task-definition.json)
            # aws ecs create-service --cluster ${CLUSTER} --service-name <your-service-name> --task-definition $new_task_definition
          fi

  build_package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: ${{env.PYTHON_VERSION}}  # replace 'x' with the version of Python you are using

      - name: Set up working directory
        run: cd ${{ github.workspace }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Build Package
        run: python setup.py sdist bdist_wheel

      # - name: Upload to GitHub Artifacts
      #   uses: actions/upload-artifact@v2
      #   with:
      #     name: package
      #     path: dist/

      - name: Upload to S3
        uses: jakejarvis/s3-sync-action@master
        env:
          AWS_S3_BUCKET: ${{env.AWS_S3_BUCKET}}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SOURCE_DIR: dist/

